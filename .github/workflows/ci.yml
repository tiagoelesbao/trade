name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm install
        
      - name: Check Project Structure
        run: |
          if [ ! -d ".aiox-core" ]; then echo "AIOX Core missing!"; exit 1; fi
          if [ ! -d ".antigravity" ]; then echo "Antigravity missing!"; exit 1; fi
          echo "Structure Validated"

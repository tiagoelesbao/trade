breakeven_candles: 4
cooldown_candles: 12
entry_retracement_pct: 0.4
exit_candles_max: 8
lookback_h1: 20
lot_size: 1.0
magic_number: 123456
min_displacement_candles: 7
stop_buffer_points: 5
symbol: EURUSD
zone_merge_points: 50

# --- NOVOS FILTROS DE FLEXIBILIDADE ---
require_volume_momentum: false  # Se true, exige volume > anterior
require_color_reversal: true   # Se true, exige fechamento de cor oposta à anterior
min_wick_pct: 0.30             # Percentual mínimo de pavio
# --- GESTÃO DE META DIÁRIA ---
daily_profit_target: 100.0     # Meta de lucro em USD para parar o robô
daily_max_loss: 50.0          # Limite de perda em USD para parar o robô
# --- FILTRO DE CONSENSO AGÊNTICO ---
use_agent_consensus: true     # Se true, espera aprovação da IA no Supabase antes de operar
consensus_timeout_secs: 30    # Tempo máximo de espera pela resposta dos agentes
consensus_min_votes: 1        # Mínimo de agentes que precisam aprovar (futuro)
